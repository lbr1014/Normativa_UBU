<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pagina principal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <h1>Página principal</h1>
    
    <p>Hola, {{ user.nombre }}</p>
    {% if user.is_admin %}
        <p>Administrador</p>
    {% else %}
        <p>Usuario normal</p>
    {% endif %}
    <p>Último inicio de sesión: {{ user.last_login.strftime("%d/%m/%Y %H:%M:%S") }}</p>
    {% if current_user.is_admin %}
        <p><a href="{{ url_for('users') }}">Administrar usuarios</a></p>
    {% endif %}

    <a href="{{ url_for('logout') }}">Cerrar sesión</a>
</body>
</html>
